name: Build UI image

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "ui/**"
      - "docker-compose*.yml"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/minecraft-ui

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ui:
              - 'ui/**'

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate YAML syntax
        run: |
          pip install yamllint
          yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}" docker-compose.yml docker-compose.portainer.yml

      - name: Validate docker-compose files
        run: |
          for f in docker-compose.yml docker-compose.portainer.yml; do
            docker compose -f "$f" config -q
          done

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r ui/requirements.txt

      - name: Lint
        run: ruff check .
        working-directory: ui

      - name: Check formatting
        run: black --check .
        working-directory: ui

      - name: Run tests
        run: python -m unittest test_app.py
        working-directory: ui

  build-and-push:
    needs: [test, changes]
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./ui
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
