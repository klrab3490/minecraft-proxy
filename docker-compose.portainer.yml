services:
  big-bear-crafty:
    container_name: big-bear-crafty
    image: registry.gitlab.com/crafty-controller/crafty-4:latest
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
    ports:
      - "8443:8443"  # HTTPS
      - "8123:8123"  # DYNMAP
      - "19132:19132/udp"  # BEDROCK
      - "25500-25600:25500-25600"  # MC SERVER PORT RANGE
    volumes:
      - /srv/docker/minecraft-proxy/crafty/backups:/crafty/backups
      - /srv/docker/minecraft-proxy/crafty/logs:/crafty/logs
      - /srv/docker/minecraft-proxy/crafty/servers:/crafty/servers
      - /srv/docker/minecraft-proxy/crafty/config:/crafty/app/config
      - /srv/docker/minecraft-proxy/crafty/import:/crafty/import
    networks:
      - big-bear-crafty

  nginx-minecraft:
    image: nginx:stable
    container_name: nginx-minecraft
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /srv/docker/minecraft-proxy/nginx/templates:/etc/nginx/templates:ro
    environment:
      - CRAFTY_HOST=${CRAFTY_HOST:-big-bear-crafty}
      - CRAFTY_PORT=${CRAFTY_PORT:-8443}
    networks:
      - big-bear-crafty

  ngrok-minecraft:
    image: ngrok/ngrok:latest
    container_name: ngrok-minecraft
    restart: unless-stopped
    # no static tunnel - the ui service starts/stops tunnels at runtime via the
    # ngrok agent API (localhost:4041), since free ngrok only allows one at a time
    command: start --none
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    volumes:
      - /srv/docker/minecraft-proxy/ngrok/ngrok.yml:/var/lib/ngrok/ngrok.yml:ro
    networks:
      - big-bear-crafty

  ui:
    image: ghcr.io/klrab3490/minecraft-proxy/minecraft-ui:latest
    container_name: minecraft-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - CRAFTY_API_TOKEN=${CRAFTY_API_TOKEN}
      - CRAFTY_BASE_URL=${CRAFTY_BASE_URL:-https://big-bear-crafty:8443/api/v2}
    networks:
      - big-bear-crafty

networks:
  big-bear-crafty:
