repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml

  - repo: local
    hooks:
      - id: docker-compose-config
        name: validate docker-compose files
        entry: bash -c 'for f in docker-compose.yml docker-compose.portainer.yml; do docker compose -f "$f" config -q || exit 1; done'
        language: system
        files: ^docker-compose.*\.yml$
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^ui/

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^ui/
